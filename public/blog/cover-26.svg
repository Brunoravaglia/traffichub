<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050914"/>
      <stop offset="0.52" stop-color="#08111B"/>
      <stop offset="1" stop-color="#0E2234"/>
    </linearGradient>
    <radialGradient id="glowGreen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(380 470) rotate(90) scale(420 540)">
      <stop stop-color="#80FF72" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#80FF72" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGold" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1060 250) rotate(90) scale(340 420)">
      <stop stop-color="#FFC84A" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFC84A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1240 660) rotate(90) scale(280 420)">
      <stop stop-color="#2C7DFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#2C7DFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="80" y1="80" x2="1520" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071019" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#09131C" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="chip" x1="300" y1="124" x2="620" y2="172" gradientUnits="userSpaceOnUse">
      <stop stop-color="#102117"/>
      <stop offset="1" stop-color="#112A1C"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="380" cy="470" rx="540" ry="420" fill="url(#glowGreen)" filter="url(#blur)"/>
  <ellipse cx="1060" cy="250" rx="420" ry="340" fill="url(#glowGold)" filter="url(#blur)"/>
  <ellipse cx="1240" cy="660" rx="420" ry="280" fill="url(#glowBlue)" filter="url(#blur)"/>

  <rect x="76" y="74" width="1448" height="752" rx="42" fill="url(#card)" stroke="#36503E" stroke-opacity="0.45" stroke-width="2"/>

  <rect x="108" y="118" width="156" height="156" rx="34" fill="#97EE88"/>
  <image href="/favicon.png" x="126" y="136" width="120" height="120" preserveAspectRatio="xMidYMid meet"/>

  <rect x="302" y="126" width="336" height="48" rx="24" fill="url(#chip)" stroke="#325646" stroke-width="2"/>
  <text x="334" y="158" fill="#A8FF77" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="1.2">AGORA EM VURP.SPACE</text>

  <text x="302" y="302" fill="#F5F7FA" font-size="86" font-family="Arial, Helvetica, sans-serif" font-weight="800">Da primeira versao</text>
  <text x="302" y="404" fill="#93FF66" font-size="92" font-family="Arial, Helvetica, sans-serif" font-weight="900">ao Vurp.space</text>

  <text x="302" y="500" fill="#A9B4BF" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="500">A evolucao completa da plataforma para gestores de trafego:</text>
  <text x="302" y="548" fill="#A9B4BF" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="500">relatorios premium, Google, Meta, LinkedIn, TikTok, Shopee Ads,</text>
  <text x="302" y="596" fill="#A9B4BF" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="500">checkout interno, blog, utilidades e operacao multi-plataforma.</text>

  <g>
    <rect x="302" y="662" width="258" height="58" rx="22" fill="#0B131C" stroke="#3A4754" stroke-width="2"/>
    <text x="330" y="701" fill="#FFC94C" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">Relatorios em PDF</text>
  </g>
  <g>
    <rect x="580" y="662" width="246" height="58" rx="22" fill="#0B131C" stroke="#3A4754" stroke-width="2"/>
    <text x="608" y="701" fill="#8CFF67" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">Checkout Stripe</text>
  </g>
  <g>
    <rect x="846" y="662" width="194" height="58" rx="22" fill="#0B131C" stroke="#3A4754" stroke-width="2"/>
    <text x="874" y="701" fill="#73B2FF" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">Blog + SEO</text>
  </g>
  <g>
    <rect x="1060" y="662" width="212" height="58" rx="22" fill="#0B131C" stroke="#3A4754" stroke-width="2"/>
    <text x="1088" y="701" fill="#CC93FF" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">Ferramentas</text>
  </g>
</svg>
