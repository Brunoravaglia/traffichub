      <stop offset="1" stop-color="#D7ED9B" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glowLeft)"/>
  <rect width="1600" height="900" fill="url(#glowRight)"/>
  <rect x="940" y="-40" width="210" height="980" transform="rotate(33 940 -40)" fill="url(#beam)" filter="url(#soft)"/>
  <rect width="1600" height="900" fill="#FFFFFF" opacity="0.035" filter="url(#grain)"/>

