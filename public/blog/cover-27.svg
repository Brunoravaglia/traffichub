      <stop offset="1" stop-color="#08110E"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(540 410) rotate(92) scale(540 740)">
      <stop stop-color="#0B5B2B" stop-opacity="0.28"/>
      <stop offset="0.46" stop-color="#06473A" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#06473A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1440 130) rotate(132) scale(440 760)">
      <stop stop-color="#D8E58A" stop-opacity="0.35"/>
      <stop offset="0.35" stop-color="#A2D16F" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#A2D16F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam" x1="1020" y1="0" x2="720" y2="900" gradientUnits="userSpaceOnUse">
